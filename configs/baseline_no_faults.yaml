# Baseline Leader-Follower (No REIP Governance)
# Fixed leader, no trust tracking, no impeachment

name: "comparison/baseline_no_faults"
policy: "baseline"
T: 200
N: 8
map_size: 60
lam: 3

comm:
  radius: 2
  p_loss: 0.0      # No faults for clean baseline
  p_corrupt: 0.0

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  obstacle_density: 0.05
  seed: 42

min_hold: 3
known_penalty: 0.6
recent_penalty: 1.2
recent_window: 10
prox_beta: 0.6

reip:
  # No governance, but same exploration parameters
  dispersion_alpha: 1.2
  jitter: 0.02
  prox_radius: 6
  window: 2
  persist_bonus: 0.6
  switch_margin: 0.15
  reserve_T: 12
  
  # No hallucinations for clean baseline
  hallucination_rate: 0.0
  command_loss_rate: 0.0
  command_radius: 100
