# Quick test version: 4 agents, 40x40 map, 200 timesteps
# Use for fast iteration/testing. For final results, use baseline_clean.yaml

name: "benchmarks/baseline_clean_quick"
policy: "baseline_leader_follower"
T: 200  # Half the timesteps
N: 4    # Half the agents
map_size: 40  # Smaller map (40x40 = 1600 cells vs 60x60 = 3600 cells)
lam: 2.5
viz_every: 0
visualize_light: true

comm:
  radius: 12
  p_loss: 0.0
  p_corrupt: 0.0

agent:
  r_local: 8
  ds: 4

env:
  obstacle_density: 0.05
  spawn_mode: "deterministic"
  spawn_seed: 12345
  seed: 42
  debug_frontiers: false
  debug_logging: false

# Performance: Sample coverage every N timesteps
coverage_sample_rate: 10  # More aggressive sampling for speed

min_hold: 3
known_penalty: 0.5
recent_penalty: 0.8
recent_window: 8

