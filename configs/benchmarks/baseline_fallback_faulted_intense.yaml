# Fixed-leader baseline with fallback autonomy under harsher adversarial conditions.

name: "benchmarks/baseline_fallback_faulted_intense"
policy: "baseline_leader_leader"
h0
N: 8
map_size: 60
lam: 2.5
viz_every: 0
visualize_light: true
fallback_enabled: true

comm:
  radius: 6
  p_loss: 0.40
  p_corrupt: 0.20

agent:
  r_local: 8
  ds: 4

env:
  obstacle_density: 0.05
  spawn_mode: "deterministic"
  spawn_seed: 12345
  seed: 42
  debug_frontiers: false
  debug_logging: false

coverage_sample_rate: 1

min_hold: 3
known_penalty: 0.5
recent_penalty: 0.8
recent_window: 8
command_radius: 10

hallucination_rate: 0.40
hallucination_schedule:
  - start: 60
    type: "overconfident"
    duration: 50
  - start: 140
    type: "dense_explored"
    duration: 60
  - start: 230
    type: "pingpong"
    duration: 80
command_loss_rate: 0.45

