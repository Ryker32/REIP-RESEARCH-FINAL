# Fixed-leader baseline (no fallback) under extremely harsh adversarial conditions.

name: "benchmarks/baseline_faulted_extreme"
policy: "baseline_leader_follower"
h0
N: 8
map_size: 60
lam: 2.5
viz_every: 0
visualize_light: true
fallback_enabled: false

comm:
  radius: 4
  p_loss: 0.50
  p_corrupt: 0.30

agent:
  r_local: 8
  ds: 4

env:
  obstacle_density: 0.05
  spawn_mode: "deterministic"
  spawn_seed: 12345
  seed: 42
  debug_frontiers: false
  debug_logging: false

coverage_sample_rate: 1

min_hold: 3
known_penalty: 0.5
recent_penalty: 0.8
recent_window: 8
command_radius: 10

hallucination_rate: 0.45
hallucination_schedule:
  - start: 40
    type: "overconfident"
    duration: 100
  - start: 160
    type: "dense_explored"
    duration: 120
  - start: 320
    type: "pingpong"
    duration: 120
  - start: 420
    type: "byzantine"
    duration: 80
command_loss_rate: 0.65

