# Baseline leader-follower with round-robin leader rotation under ideal communications.
# Rotates leader every 50 steps to compare against fixed leader and REIP.

name: "benchmarks/baseline_roundrobin_clean"
policy: "baseline_leader_follower"
h0
N: 8
map_size: 60
lam: 2.5
viz_every: 0
visualize_light: true

comm:
  radius: 12
  p_loss: 0.0
  p_corrupt: 0.0

agent:
  r_local: 8
  ds: 4

env:
  obstacle_density: 0.05
  spawn_mode: "deterministic"
  spawn_seed: 12345
  seed: 42
  debug_frontiers: false
  debug_logging: false

# Coverage calculation: Set to 1 for every timestep (full precision)
# With parallelization, this overhead is minimal
coverage_sample_rate: 1

min_hold: 3
known_penalty: 0.5
recent_penalty: 0.8
recent_window: 8

# Round robin rotation: leader changes every 50 steps
round_robin_interval: 50

# No REIP block here—baseline leader rotates on schedule, no trust-based governance.

