# Baseline leader-follower with round-robin leader rotation under adversarial communications.
# Rotates leader every 50 steps to compare against fixed leader and REIP under faults.

name: "benchmarks/baseline_roundrobin_faulted"
policy: "baseline_leader_follower"
h0
N: 8
map_size: 60
lam: 2.5
viz_every: 0
visualize_light: true
fallback_enabled: false

comm:
  radius: 9
  p_loss: 0.30
  p_corrupt: 0.15

agent:
  r_local: 8
  ds: 4

env:
  obstacle_density: 0.05
  spawn_mode: "deterministic"
  spawn_seed: 12345
  seed: 42
  debug_frontiers: false
  debug_logging: false

# Coverage calculation: Set to 1 for every timestep (full precision)
# With parallelization, this overhead is minimal
coverage_sample_rate: 1

min_hold: 3
known_penalty: 0.5
recent_penalty: 0.8
recent_window: 8
command_radius: 10

# Round robin rotation: leader changes every 50 steps
round_robin_interval: 50

# Adversarial conditions: compounded hallucinations + heavy command loss.
# Deterministic schedule ensures every run hits multiple failure modes.
hallucination_rate: 0.35
hallucination_schedule:
  - start: 60
    type: "overconfident"
    duration: 24
  - start: 150
    type: "dense_explored"
    duration: 30
  - start: 260
    type: "pingpong"
    duration: 50
command_loss_rate: 0.20

