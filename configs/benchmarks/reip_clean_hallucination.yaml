# Mostly clean comms with brief hallucination bursts.
# Purpose: highlight CUSUM's benefit when the environment is benign but the leader occasionally over-promises.

name: "benchmarks/reip_clean_hallucination"
policy: "reip_true"
T: 420
N: 8
map_size: 60
lam: 2.5
viz_every: 0
visualize_light: true

comm:
  radius: 12
  p_loss: 0.05
  p_corrupt: 0.02

agent:
  r_local: 8
  ds: 4

env:
  obstacle_density: 0.05
  spawn_mode: "deterministic"
  spawn_seed: 13579
  seed: 4242
  debug_frontiers: false
  debug_logging: false

coverage_sample_rate: 1

min_hold: 3
known_penalty: 0.5
recent_penalty: 0.2
recent_window: 6

reip:
  debug_prints: false
  assignment_algorithm: "greedy_bfs"
  fallback_enabled: true
  fallback_on_command_loss: true
  fallback_on_noop: true
  trust_decay_rate: 0.12
  trust_threshold: 0.5
  min_trust: 0.2
  trust_recovery_rate: 0.05
  impeachment_persistence: 2
  impeachment_cooldown: 10
  pred_gain_alpha: 0.03
  pred_gain_radius: 3
  pred_gain_inflation_base: 3.2
  pred_gain_inflation_jitter: 1.5
  command_radius: 12
  command_loss_rate: 0.05
  connectivity_beta: 0.08
  hallucination_rate: 0.1
  hallucination_schedule:
    - start: 150
      type: "overconfident"
      duration: 70
    - start: 260
      type: "dense_explored"
      duration: 60
  dispersion_alpha: 1.2
  prox_radius: 6
  window: 2
  persist_bonus: 0.22
  switch_margin: 0.07
  cusum_threshold: 1.2
  cusum_min_samples: 6

