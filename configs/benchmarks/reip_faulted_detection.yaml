# REIP detection-stress scenario:
# - Shrinks comm radius and increases loss so agents depend on leader commands.
# - Stacks long hallucinations early in the run and shortens T so late recovery is impossible.
# - Limits fallback triggers during active attacks so only fast detection+governance can save the team.
# Use this as the base config for strict ablations when you want the NoDetect variant to degrade sharply.

name: "benchmarks/reip_faulted_detection"
policy: "reip_true"
T: 420
N: 8
map_size: 60
lam: 2.5
viz_every: 0
visualize_light: true

comm:
  radius: 8
  p_loss: 0.25
  p_corrupt: 0.12

agent:
  r_local: 8
  ds: 4

env:
  obstacle_density: 0.05
  spawn_mode: "deterministic"
  spawn_seed: 54321
  seed: 4242
  debug_frontiers: false
  debug_logging: false

coverage_sample_rate: 1

min_hold: 3
known_penalty: 0.5
recent_penalty: 0.2
recent_window: 6

reip:
  debug_prints: false
  assignment_algorithm: "greedy_bfs"
  fallback_enabled: true
  fallback_on_command_loss: false
  fallback_on_noop: true
  disable_fallback_during_attack: true
  trust_decay_rate: 0.08
  trust_threshold: 0.5
  min_trust: 0.2
  trust_recovery_rate: 0.04
  impeachment_persistence: 3
  impeachment_cooldown: 12
  pred_gain_alpha: 0.03
  pred_gain_radius: 3
  pred_gain_inflation_base: 4.5
  pred_gain_inflation_jitter: 2.0
  command_radius: 8
  command_loss_rate: 0.30
  connectivity_beta: 0.10
  hallucination_rate: 0.6
  hallucination_schedule:
    - start: 110
      type: "dense_explored"
      duration: 150
    - start: 260
      type: "overconfident"
      duration: 90
  dispersion_alpha: 1.2
  prox_radius: 6
  window: 2
  persist_bonus: 0.22
  switch_margin: 0.07
  cusum_threshold: 0.6
  cusum_min_samples: 6
  loop_detection_enabled: true
  coverage_stagnation_window: 10
  coverage_stagnation_threshold: 0.01

