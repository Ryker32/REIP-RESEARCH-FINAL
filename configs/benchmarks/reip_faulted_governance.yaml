# REIP governance-stress scenario:
# - Agents stay highly connected (large comm radius, low loss)
# - Leader spends long stretches hallucinating
# - Fallback only triggers when agents fully disconnect
#   so governance must replace compromised leaders to maintain coverage.

name: "benchmarks/reip_faulted_governance"
policy: "reip_true"
T: 500
N: 8
map_size: 60
lam: 2.5
viz_every: 0
visualize_light: true

comm:
  radius: 10
  p_loss: 0.20
  p_corrupt: 0.10

agent:
  r_local: 8
  ds: 4

env:
  obstacle_density: 0.05
  spawn_mode: "deterministic"
  spawn_seed: 12345
  seed: 42
  debug_frontiers: false
  debug_logging: false

coverage_sample_rate: 1

min_hold: 3
known_penalty: 0.5
recent_penalty: 0.2
recent_window: 6

reip:
  debug_prints: false
  assignment_algorithm: "greedy_bfs"
  fallback_enabled: true
  fallback_on_command_loss: false
  fallback_on_noop: false
  trust_decay_rate: 0.5
  trust_threshold: 0.75
  min_trust: 0.2
  trust_recovery_rate: 0.06
  impeachment_persistence: 1
  impeachment_cooldown: 5
  pred_gain_alpha: 0.03
  pred_gain_radius: 3
  pred_gain_inflation_base: 6.0
  pred_gain_inflation_jitter: 3.0
  command_radius: 10
  command_loss_rate: 0.25
  connectivity_beta: 0.10
  hallucination_rate: 0.45
  hallucination_schedule:
    - start: 0
      type: "overconfident"
      duration: 160
    - start: 160
      type: "dense_explored"
      duration: 160
    - start: 320
      type: "pingpong"
      duration: 150
    - start: 420
      type: "byzantine"
      duration: 150
  dispersion_alpha: 1.2
  prox_radius: 6
  window: 2
  persist_bonus: 0.22
  switch_margin: 0.07
  cusum_threshold: 10.0
  cusum_min_samples: 5

