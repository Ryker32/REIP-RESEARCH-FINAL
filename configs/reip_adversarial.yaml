# TRUE REIP - Adversarial Conditions
# Shows REIP's resilience: detects and removes bad leaders

name: "comparison/reip_adversarial"
policy: "reip_true"
T: 400
N: 8
map_size: 80
lam: 3

comm:
  radius: 12
  p_loss: 0.10      # Same faults as baseline
  p_corrupt: 0.05

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  spawn_center: [40, 40]
  spawn_radius: 5
  obstacle_density: 0.05
  seed: 42

min_hold: 3
known_penalty: 0.6
recent_penalty: 1.2
recent_window: 10
prox_beta: 0.6

reip:
  # Trust parameters (BALANCED - stable during normal operation, sensitive to attacks)
  trust_decay_rate: 0.8       # 🎯 High sensitivity to errors
  trust_threshold: 0.70       # 🎯 Moderate threshold
  min_trust: 0.1
  trust_recovery_rate: 0.02   # 🎯 Modest recovery (not too slow)
  
  # Adversarial attack configuration
  hallucination_rate: 0.09
  # Prevent autonomy from masking the attack
  
  # Predicted gain parameters (REALISTIC baseline + attack inflation)
  # KEY INSIGHT: Conservative alpha means predicted ≈ observed during normal exploration
  # This keeps trust stable. Inflation ONLY applies during attacks to create big gap.
  pred_gain_inflation_base: 8.0    # 🎯 8x-12x inflation during attack = huge gap
  pred_gain_inflation_jitter: 4.0
  pred_gain_alpha: 0.10            # 🎯 CONSERVATIVE (was 0.3) - realistic normal prediction
  pred_gain_radius: 3              # 🎯 Smaller window (was 4) - less overestimation
  
  # Communication (no faults - isolate governance testing)
  command_radius: 12
  connectivity_beta: 0.2
  command_loss_rate: 0.0
  
  # Exploration
  dispersion_alpha: 1.2
  jitter: 0.02
  prox_radius: 8
  window: 2
  persist_bonus: 0.6
  switch_margin: 0.15
  reserve_T: 12

neighbor_proximity_radius: 2
neighbor_repulsion: 0.8
reservation_penalty: 3.0
recent_window: 6
recent_penalty: 0.6