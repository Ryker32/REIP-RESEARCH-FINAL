# REIP - Adversarial (Chain/Anti-Clique tuned)
# Purpose: Maintain ≥2-neighbor connectivity while discouraging 3-agent cliques,
#          encouraging chain-like outward spread for better coverage.

name: "comparison/reip_adversarial_chain"
policy: "reip_true"
T: 400
N: 8
map_size: 80
lam: 3

comm:
  radius: 12            # Comm range used for map sharing (align with command_radius)
  p_loss: 0.10
  p_corrupt: 0.05

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  spawn_center: [40, 40]
  spawn_radius: 5
  obstacle_density: 0.05
  seed: 42

# Motion-level deconfliction
min_hold: 3
known_penalty: 0.6
recent_penalty: 0.6
recent_window: 8
prox_beta: 0.8
neighbor_proximity_radius: 2
neighbor_repulsion: 0.8
reservation_penalty: 3.0

reip:
  # Governance / trust
  trust_decay_rate: 0.8
  trust_threshold: 0.70
  min_trust: 0.1
  trust_recovery_rate: 0.02

  # Adversarial attack
  hallucination_rate: 0.0
  hallucination_schedule:
    - start: 120
      type: "dense_explored"
      duration: 100
  dense_explored_strict: true
  disable_fallback_during_attack: true

  # Predicted gain
  pred_gain_inflation_base: 8.0
  pred_gain_inflation_jitter: 4.0
  pred_gain_alpha: 0.10
  pred_gain_radius: 3

  # Communication (align with comm)
  command_loss_rate: 0.0
  command_radius: 20

  # Connectivity shaping
  connectivity_beta: 0.5         # encourage ≥2 neighbors
  triangle_penalty: 0.5          # discourage 3-agent cliques
  degree_target: 2               # prefer degree ≈ 2
  degree_over_penalty: 0.10      # penalize hubs
  chain_beta: 0.35               # outward bonus relative to leader

  # Exploration/assignment tuning
  dispersion_alpha: 1.0
  prox_radius: 10
  window: 2
  persist_bonus: 0.25
  switch_margin: 0.12
  # Regional diversity to avoid dogpiling
  region_capacity: 1
  # region_size: 8 # uncomment to force coarse region granularity
