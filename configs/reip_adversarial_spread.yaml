# TRUE REIP - Adversarial Conditions (Spread/Relay tuned)
# Goal: Reduce clustering and criss-crossing while maintaining relay connectivity

name: "comparison/reip_adversarial_spread"
policy: "reip_true"
T: 400
N: 8
map_size: 80
lam: 3

comm:
  radius: 10           # larger comm radius so agents can spread yet relay
  p_loss: 0.10
  p_corrupt: 0.05

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  spawn_center: [40, 40]
  spawn_radius: 5
  obstacle_density: 0.05
  seed: 42

# motion-level deconfliction knobs
min_hold: 3
known_penalty: 0.6
recent_penalty: 0.6       # slightly lower than adversarial to allow smoother flow
recent_window: 8
prox_beta: 0.8            # stronger spread pressure over time
neighbor_proximity_radius: 2
neighbor_repulsion: 0.8
reservation_penalty: 3.0

reip:
  # Trust parameters
  trust_decay_rate: 0.8
  trust_threshold: 0.70
  min_trust: 0.1
  trust_recovery_rate: 0.02

  # Adversarial attack configuration
  hallucination_rate: 0.0
  hallucination_schedule:
    - start: 120
      type: "dense_explored"
      duration: 100
  dense_explored_strict: true   # Only target fully explored cells (no unknown borders)
  disable_fallback_during_attack: true  # Prevent autonomy from masking the attack

  # Predicted gain parameters
  pred_gain_inflation_base: 8.0
  pred_gain_inflation_jitter: 4.0
  pred_gain_alpha: 0.10
  pred_gain_radius: 3

  # Communication (align with comm radius)
  command_loss_rate: 0.0
  command_radius: 10
  connectivity_beta: 0.25    # prefer targets that keep >=2 neighbors in range

  # Exploration/assignment tuning
  dispersion_alpha: 1.0
  jitter: 0.02
  prox_radius: 10            # larger region for spread penalty
  window: 2
  persist_bonus: 0.25        # less sticky to old targets
  switch_margin: 0.12        # allow switching when better options arise
  reserve_T: 12
