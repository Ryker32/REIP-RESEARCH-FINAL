# REIP with CBBA (Consensus-Based Bundle Algorithm) Assignment
# 
# Uses auction-based market mechanism for frontier assignment instead of greedy sequential
# Eliminates clustering by ensuring spatial exclusion between agents' target zones
#
# Citation: Choi, Han-Lim, Brunet, Luc, & How, Jonathan P. (2009). 
#           "Consensus-Based Decentralized Auctions for Robust Task Allocation." 
#           IEEE Transactions on Robotics, 25(4), 912-926.

name: "cbba/reip_cbba_auction"
policy: "reip_true"
T: 400
N: 8
map_size: 80
lam: 3

comm:
  radius: 15
  p_loss: 0.05
  p_corrupt: 0.02
  guard_enable: true
  guard_min_degree: 1
  guard_margin: 1

agent:
  r_local: 10
  ds: 4
  share_interval: 2
  sensor_radius: 5  # FOV radius for observation

env:
  spawn_center: [5, 75]
  spawn_radius: 4
  obstacle_density: 0.05
  seed: 42
  custom_map: null

# Motion-level deconfliction
min_hold: 2
known_penalty: 0.6
recent_penalty: 0.6
recent_window: 8
prox_beta: 0.3
neighbor_proximity_radius: 2
neighbor_repulsion: 0.8
reservation_penalty: 3.0

reip:
  # Assignment Algorithm Selection
  # 'greedy_bfs' (default): Sequential BFS-ordered connected assignment
  # 'cbba': Consensus-Based Bundle Algorithm (auction-based, optimal spatial allocation)
  assignment_algorithm: "cbba"

  # Trust and governance (matching reip_connected_spread for fair comparison)
  trust_decay_rate: 0.4      # Same as connected_spread
  trust_threshold: 0.70      # Same as connected_spread
  trust_recovery_rate: 0.02
  min_trust: 0.1
  trust_deadband: 0.15       # Increased from 0.10 to tolerate small mismatches
  trust_event_pred_min: 0.20
  trust_event_obs_max: 0.05
  trust_decay_cap: 0.15      # Reduced from 0.25 to match connected_spread

  # Exploration parameters
  prox_beta: 0.3
  prox_radius: 6
  persist_bonus: 0.3
  switch_margin: 0.5
  min_hold: 2

  # Connectivity constraints (for CBBA tethering)
  command_radius: 15
  tether_margin: 3
  multi_hop_commands: true

  # Spatial exclusion (enforced in CBBA auction)
  frontier_spacing_radius: 6
  fov_radius: 5  # Combined with spacing for exclusion zones

  # Predicted gain estimation (used in trust updates)
  # CBBA spreads agents far apart → slower incremental discovery → lower pred_gain_alpha
  pred_gain_alpha: 0.10    # Expect 10% reduction per step (conservative for spread-out agents)
  pred_gain_radius: 3      # Window size for trust measurement

  # No hallucination for clean test
  hallucination_rate: 0.0
  command_loss_rate: 0.0

# Logging
log_trust: true
log_metrics: true
render_interval: 10
max_steps: 500
