# REIP with CBBA (strict FOV exclusion)

name: "cbba/reip_cbba_strict_fov"
policy: "reip_true"
T: 400
N: 8
map_size: 80
lam: 3

comm:
  radius: 15
  p_loss: 0.05
  p_corrupt: 0.02
  guard_enable: true
  guard_min_degree: 1
  guard_margin: 1

agent:
  r_local: 10
  ds: 4
  share_interval: 2
  sensor_radius: 5

env:
  spawn_center: [5, 75]
  spawn_radius: 4
  obstacle_density: 0.05
  seed: 42
  custom_map: null

# Motion-level deconfliction
min_hold: 2
known_penalty: 0.6
recent_penalty: 0.6
recent_window: 8
prox_beta: 0.3
neighbor_proximity_radius: 2
neighbor_repulsion: 0.8
reservation_penalty: 3.0

reip:
  assignment_algorithm: "cbba"

  # Trust and governance
  trust_decay_rate: 0.4
  trust_threshold: 0.70
  trust_recovery_rate: 0.02
  min_trust: 0.1
  trust_deadband: 0.15
  trust_event_pred_min: 0.20
  trust_event_obs_max: 0.05
  trust_decay_cap: 0.15

  # Exploration
  prox_beta: 0.3
  prox_radius: 6
  persist_bonus: 0.3
  switch_margin: 0.5
  min_hold: 2

  # Connectivity constraints (for CBBA tethering)
  command_radius: 15
  tether_margin: 3
  multi_hop_commands: true

  # Spatial exclusion
  frontier_spacing_radius: 8
  fov_radius: 5
  strict_fov_exclusion: true
  fov_shape: "square"   # use L∞ distance (grid-consistent)
  fov_margin: 5          # small buffer beyond 2*FOV

  # Predicted gain estimation (trust updates)
  pred_gain_alpha: 0.10
  pred_gain_radius: 3

  # Clean test (no extra governance faults)
  hallucination_rate: 0.0
  command_loss_rate: 0.0

# Logging
log_trust: true
log_metrics: true
render_interval: 10
max_steps: 500
