# REIP - Connected Dispersion (Corner Spawn)
# Purpose: Start agents near a corner, spread for coverage, and maintain connectivity
# using multi-hop relay, a soft parent tether, a conditional heading bias, and regroup fallback.

name: "comparison/reip_connected_corner"
policy: "reip_true"
T: 400
N: 8
map_size: 80
lam: 3

comm:
  radius: 12           # neighbor range for sharing (align with command_radius)
  p_loss: 0.05         # light loss; multi-hop mitigates
  p_corrupt: 0.00

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  # Spawn near bottom-left corner: (x ~ 5, y ~ map_size-5)
  spawn_center: [5, 75]
  spawn_radius: 4
  obstacle_density: 0.05
  seed: 42

# Motion-level deconfliction
min_hold: 5                  # more persistence to reduce swirl
known_penalty: 0.6
recent_penalty: 1.2
recent_window: 8
prox_beta: 0.8
neighbor_proximity_radius: 3
neighbor_repulsion: 1.2
reservation_penalty: 4.0

reip:
  # Governance / trust
  trust_decay_rate: 0.4           # softer decay to reduce sensitivity
  trust_threshold: 0.70
  min_trust: 0.1
  trust_recovery_rate: 0.02
  # Robust trust guards: react only to clearly illogical outcomes
  trust_deadband: 0.12            # ignore small pred/obs mismatches
  trust_event_pred_min: 0.18      # only penalize when leader claimed ≥ this gain
  trust_event_obs_max: 0.04       # ...but observed ≤ this (near-zero progress)
  trust_decay_cap: 0.25           # cap max one-step drop to 25%

  # Faults (off for this test)
  hallucination_rate: 0.0

  # Predicted gain
  pred_gain_inflation_base: 6.0
  pred_gain_inflation_jitter: 2.0
  pred_gain_alpha: 0.10
  pred_gain_radius: 3

  # Communication and relay
  command_loss_rate: 0.0
  command_radius: 12
  multi_hop_commands: true      # enable relay

  # Connectivity shaping (mild)
  connectivity_beta: 0.25        # softer cohesion to avoid bunching
  triangle_penalty: 0.4          # discourage tight triads
  degree_target: 2
  degree_over_penalty: 0.10
  degree_min_target: 1          # require at least 1 neighbor; pairs OK, avoid cliques
  degree_under_penalty: 0.12    # light penalty for dropping to 0
  chain_beta: 0.30               # outward push along component
  frontier_spacing_radius: 8     # don't pick frontiers too close in the same step
  adaptive_connectivity: true    # reduce cohesion when graph is healthy
  adapt_scale_min: 0.5           # 50% of cohesion/tether when safe
  adapt_deg_safe: 1.8            # target avg degree considered safe
  frontier_spacing_extra_safe: 1 # add extra spacing when safe

  # Tether + heading bias (connectivity without herding)
  enable_beacon_tether: true
  tether_lambda: 0.25
  tether_margin: 1

  enable_heading_bias: true
  heading_gamma: 0.15
  heading_risk_min_degree: 1

  # Linked-signature relay health
  link_signature_ttl: 6         # ticks to remain 'linked' after last relay
  link_risk_ttl_thresh: 1       # trigger later to prevent premature flocking
  link_risk_penalty: 0.15       # milder penalty to reduce bunching

  # Regroup when isolated
  enable_regroup: true
  regroup_min_degree: 1

  # Assignment tuning
  dispersion_alpha: 1.1
  prox_radius: 12
  window: 2
  jitter: 0.02
  persist_bonus: 0.45
  switch_margin: 0.12
  region_capacity: 1
