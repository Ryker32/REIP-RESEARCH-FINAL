# REIP connected assignment stress-test on a corridor-like map
# Validates: single connected component, no leaf parking, reduced sibling crowding

name: "comparison/reip_connected_corridor"
policy: "reip_true"
T: 350
N: 8
map_size: 80
lam: 3

comm:
  radius: 10
  p_loss: 0.10
  p_corrupt: 0.05
  guard_enable: true
  guard_min_degree: 1
  guard_margin: 1

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  # Use a simple corridor/room map to provoke tight connectivity decisions
  map_file: "maps/simple_example.txt"
  spawn_center: [40, 40]
  spawn_radius: 3
  seed: 42

# motion deconfliction
min_hold: 3
known_penalty: 0.6
recent_penalty: 0.6
recent_window: 8
prox_beta: 0.8
neighbor_proximity_radius: 2
neighbor_repulsion: 0.8
reservation_penalty: 3.0

reip:
  # Trust
  trust_decay_rate: 0.8
  trust_threshold: 0.70
  min_trust: 0.1
  trust_recovery_rate: 0.02

  # Connected assignment + beacon
  command_radius: 10
  enable_beacon_tether: true
  tether_margin: 1
  multi_hop_commands: true

  # Spacing and anti-clump (local + global)
  degree_min_target: 2
  degree_under_penalty: 0.4
  region_capacity: 1
  frontier_spacing_radius: 4

  # Frontier scoring knobs
  dispersion_alpha: 1.0
  jitter: 0.02
  prox_radius: 10
  window: 2
  persist_bonus: 0.25
  switch_margin: 0.12
  reserve_T: 12
