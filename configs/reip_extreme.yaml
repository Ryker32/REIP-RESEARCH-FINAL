# REIP - EXTREME Adversarial Conditions
# Same faults as baseline, but REIP can detect and remove bad leaders

name: "comparison/reip_extreme"
policy: "reip_true"
T: 150
N: 8
map_size: 60
lam: 3

comm:
  radius: 2
  p_loss: 0.15      # Same as baseline
  p_corrupt: 0.10

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  obstacle_density: 0.05
  seed: 42

min_hold: 3
known_penalty: 0.6
recent_penalty: 1.2
recent_window: 10
prox_beta: 0.6

reip:
  # Trust parameters (SENSITIVE to detect faults quickly)
  trust_decay_rate: 0.30      # Very sensitive - trust drops fast with bad predictions
  trust_threshold: 0.45       # Moderate threshold for impeachment
  min_trust: 0.05
  trust_recovery_rate: 0.08   # Fast recovery for good agents
  
  # Same extreme adversarial conditions
  hallucination_rate: 0.08    # 8% per step
  command_loss_rate: 0.20     # 20% command loss
  command_radius: 12          # Very limited range
  
  # Exploration
  dispersion_alpha: 1.2
  jitter: 0.02
  prox_radius: 6
  window: 2
  persist_bonus: 0.6
  switch_margin: 0.15
  reserve_T: 12
