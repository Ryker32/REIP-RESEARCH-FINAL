# REIP with Gilbert-Elliot Bursty Packet Loss
# Tests ATLIS resilience under realistic wireless communication with temporal correlation

name: "experiments/reip_gilbert_elliot"
policy: "reip_true"
T: 300
N: 8
map_size: 60
lam: 3

comm:
  radius: 20                      # Communication range (Manhattan distance)
  use_gilbert_elliot: true        # Enable Gilbert-Elliot channel model
  
  # Gilbert-Elliot parameters (NTIA notation)
  gilbert_elliot_params:
    p: 0.1    # P(Good → Bad transition) = 10%
    r: 0.3    # P(Bad → Good transition) = 30%
    k: 0.95   # P(no error | Good state) = 95% success in Good
    h: 0.30   # P(no error | Bad state) = 30% success in Bad
  
  # These create ~21% average packet loss with bursts of 3-4 consecutive drops
  # Steady state: 75% time in Good, 25% time in Bad
  # Expected burst length: 1/r = 3.33 consecutive packet drops
  
  p_corrupt: 0.0  # Map corruption (separate from packet loss)

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  obstacle_density: 0.05
  seed: 42

min_hold: 3
known_penalty: 0.6
recent_penalty: 1.2
recent_window: 10
prox_beta: 0.6

# REIP Governance Parameters
reip:
  trust_decay_rate: 0.5
  trust_threshold: 0.6
  min_trust: 0.1
  trust_recovery_rate: 0.02
  hallucination_rate: 0.0  # No Byzantine faults (testing communication only)
  dispersion_alpha: 1.2
  jitter: 0.02
  cluster_radius: 4
  prox_radius: 6
  window: 2
  persist_bonus: 0.6
  switch_margin: 0.15
  reserve_T: 12
