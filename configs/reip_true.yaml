# TRUE REIP Configuration
# Tests the Resilient Election & Impeachment Policy with trust-based governance

name: "policy/reip_true"
policy: "reip_true"  # Use the true REIP controller
T: 400  # Longer run to see multiple elections
N: 8
map_size: 80
lam: 3

comm:
  radius: 1000
  p_loss: 0.00

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  #custom_map: "office"
  obstacle_density: 0.05
  seed: 42
  spawn_center: [40, 40]
  spawn_radius: 5

min_hold: 5
known_penalty: 0.6
recent_penalty: 1.2
recent_window: 10
prox_beta: 0.6

# TRUE REIP Governance Parameters
reip:
  # Trust and Impeachment

  trust_decay_rate: 0.8        # k: sensitivity to prediction errors
  trust_threshold: 0.7         # τ: impeachment trigger (avg trust < threshold)
  min_trust: 0.1               # Floor to prevent complete distrust
  trust_recovery_rate: 0.02    # Gradual trust recovery for non-leaders
  
  # Visualization: show per-agent belief maps next to global map (professor view)
  draw_agent_maps: true
  # Impeachment safeguards
  impeachment_cooldown: 15
  impeachment_persistence: 3
  # Enable dispersion (reduce clustering)
  dispersion_enabled: true
  dispersion_weight: 0.4
  min_separation_distance: 6
  
  # CUSUM detection (quantitative impeachment)
  cusum_kappa: 0.1
  cusum_threshold: 5.0
  # Hallucination Testing (fault injection)
  hallucination_rate: 0.00     # Probability of leader hallucination per step (2%)
  # Optional: fix the hallucination profile for experiments (overconfident|byzantine|clustered|dense_explored|pingpong)
  # hallucination_profile: dense_explored
  # For pingpong profile: control duration (default 30 steps)
  # hallucination_pingpong_duration: 30
  
  # Exploration Parameters (same as before)
  dispersion_alpha: 1.2
  jitter: 0.02
  cluster_radius: 4
  prox_radius: 6
  window: 2
  persist_bonus: 0.6
  switch_margin: 0.15
  reserve_T: 12
