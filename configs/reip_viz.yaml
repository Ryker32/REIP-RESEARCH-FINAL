# REIP Configuration for Visualization (Shorter Duration)

seed: 42
map_size: 60
N: 8
num_agents: 8
obstacle_density: 0.05
T: 150  # Shorter for visualization

policy: "reip_true"

comm:
  radius: 2
  p_loss: 0.08
  p_corrupt: 0.05

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  obstacle_density: 0.05
  seed: 42

reip:
  # Trust Parameters
  trust_threshold: 0.25
  trust_decay_rate: 0.10
  min_trust: 0.05
  trust_recovery_rate: 0.15
  
  # Fault injection
  hallucination_rate: 0.04
  command_loss_rate: 0.00  # DISABLED - was causing all agents to stuck
  command_radius: 100      # Large enough to cover map

# Frontier parameters
lambda_coverage: 1.0
lambda_entropy: 0.5
lambda_distance: 0.2
reservation_duration: 3

visualize: false
