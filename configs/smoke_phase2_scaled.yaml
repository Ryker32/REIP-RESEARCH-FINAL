name: smoke/reip_phase2_scaled
policy: reip_true
T: 200
N: 6
map_size: 50
debug_use_team_frontiers: false
debug_force_nearest: false
min_hold: 1

env:
  obstacle_density: 0.08
  seed: 42
  debug_frontiers: true
  debug_frontiers_every: 20
  debug_comms: false  # Less spam at scale
  debug_logging: true

comm:
  radius: 20
  p_loss: 0.0

agent:
  r_local: 8
  ds: 4          # Coarser grid for larger map (50/4 = ~12x12 coarse)
  share_interval: 1

reip:
  command_radius: 20
  window: 3
  prox_radius: 6
  frontier_spacing_radius: 4
  persist_bonus: 0.0
  switch_margin: 0.0
  multi_hop_commands: true

phase2:
  enable: true
  leader_blind: false
  frontiers_from_leader: true
  planner_belief: leader
