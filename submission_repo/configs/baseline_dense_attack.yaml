# Baseline Leader-Follower WITH Adversarial Faults
# Shows how traditional systems fail under adversarial conditions

name: "comparison/baseline_adversarial"
policy: "baseline"
T: 400
N: 8
map_size: 80
lam: 3

comm:
  radius: 2
  p_loss: 0.10      # 10% packet loss
  p_corrupt: 0.05   # 5% map corruption

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  obstacle_density: 0.05
  seed: 42

min_hold: 3
known_penalty: 0.6
recent_penalty: 1.2
recent_window: 10
prox_beta: 0.6

reip:
  dispersion_alpha: 1.2
  jitter: 0.02
  prox_radius: 8
  window: 2
  persist_bonus: 0.6
  switch_margin: 0.15
  reserve_T: 12
  
  # Adversarial conditions
  hallucination_rate: 0.00
  hallucination_schedule:
    - start: 120
      type: "dense_explored"
      duration: 100    # 3% hallucination rate (leader goes bad)
      dense_explored_strict: true   # Strict mode to challenge
  command_loss_rate: 0.0     # 15% command loss
  command_radius: 1000          # Limited command range
