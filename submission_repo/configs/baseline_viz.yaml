# Baseline Configuration for Visualization (Shorter Duration)

seed: 42
map_size: 60
N: 8
num_agents: 8
obstacle_density: 0.05
T: 150  # Shorter for visualization

policy: "baseline"

comm:
  radius: 2
  p_loss: 0.08      # Same as REIP
  p_corrupt: 0.05

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  obstacle_density: 0.05
  seed: 42

# Baseline uses same fault parameters in top level
hallucination_rate: 0.04
command_loss_rate: 0.12
command_radius: 15

# Frontier parameters (standard)
lambda_coverage: 1.0
lambda_entropy: 0.5
lambda_distance: 0.2
reservation_duration: 3

visualize: false
