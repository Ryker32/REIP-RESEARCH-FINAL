# Quick test version: 4 agents, 40x40 map, 200 timesteps
# Use for fast iteration/testing. For final results, use reip_clean.yaml

name: "benchmarks/reip_clean_quick"
policy: "reip_true"
T: 200  # Half the timesteps
N: 4    # Half the agents
map_size: 40  # Smaller map
lam: 2.5
viz_every: 0
visualize_light: true

comm:
  radius: 12
  p_loss: 0.0
  p_corrupt: 0.0

agent:
  r_local: 8
  ds: 4

env:
  obstacle_density: 0.05
  spawn_mode: "deterministic"
  spawn_seed: 12345
  seed: 42
  debug_frontiers: false
  debug_logging: false

# Performance: Sample coverage every N timesteps
coverage_sample_rate: 10  # More aggressive sampling for speed

min_hold: 3
known_penalty: 0.5
recent_penalty: 0.8
recent_window: 8

reip:
  debug_prints: false
  assignment_algorithm: "entropy_global"
  trust_decay_rate: 0.6
  trust_threshold: 0.65
  min_trust: 0.1
  trust_recovery_rate: 0.02
  pred_gain_alpha: 0.15
  pred_gain_radius: 3
  command_radius: 12
  command_loss_rate: 0.0
  connectivity_beta: 0.15
  dispersion_alpha: 1.0
  prox_radius: 6
  window: 2
  persist_bonus: 0.2
  switch_margin: 0.05

