# REIP controller with fallback autonomy under adversarial conditions.
# Convenience wrapper mirroring reip_faulted.yaml.

name: "benchmarks/reip_fallback_faulted"
policy: "reip_true"
h0
N: 8
map_size: 60
lam: 2.5
viz_every: 0
visualize_light: true

comm:
  radius: 9
  p_loss: 0.30
  p_corrupt: 0.15

agent:
  r_local: 8
  ds: 4

env:
  obstacle_density: 0.05
  spawn_mode: "deterministic"
  spawn_seed: 12345
  seed: 42
  debug_frontiers: false
  debug_logging: false

coverage_sample_rate: 1

min_hold: 3
known_penalty: 0.5
recent_penalty: 0.2
recent_window: 6

reip:
  debug_prints: false
  assignment_algorithm: "greedy_bfs"
  fallback_enabled: true
  trust_decay_rate: 0.25
  trust_threshold: 0.45
  min_trust: 0.2
  trust_recovery_rate: 0.06
  pred_gain_alpha: 0.03
  pred_gain_radius: 3
  pred_gain_inflation_base: 6.0
  pred_gain_inflation_jitter: 3.0
  command_radius: 10
  command_loss_rate: 0.20
  connectivity_beta: 0.10
  hallucination_rate: 0.35
  hallucination_schedule:
    - start: 60
      type: "overconfident"
      duration: 24
    - start: 150
      type: "dense_explored"
      duration: 30
    - start: 260
      type: "pingpong"
      duration: 50
  dispersion_alpha: 1.2
  prox_radius: 6
  window: 2
  persist_bonus: 0.22
  switch_margin: 0.07
  cusum_threshold: 25.0
  cusum_min_samples: 25

