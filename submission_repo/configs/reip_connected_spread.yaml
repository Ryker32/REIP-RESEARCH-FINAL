# REIP with connectivity-preserving assignment (BFS-tree tether)
# Use this to validate that the team remains a single connected component during exploration.

name: "comparison/reip_connected_spread"
policy: "reip_true"
T: 400
N: 8
map_size: 80
lam: 3

comm:
  radius: 10            # align with policy (motion and assignment agree)
  p_loss: 0.10
  p_corrupt: 0.05
  guard_enable: true
  guard_min_degree: 1
  guard_margin: 1

agent:
  r_local: 8
  ds: 4
  share_interval: 2

env:
  spawn_center: [5, 75]
  spawn_radius: 4
  obstacle_density: 0.05
  seed: 42

# motion-level deconfliction knobs
min_hold: 2  # Reduced from 3 to allow faster re-assignment when better frontiers appear
known_penalty: 0.6
recent_penalty: 0.6
recent_window: 8
prox_beta: 0.8
neighbor_proximity_radius: 2
neighbor_repulsion: 0.8
reservation_penalty: 3.0

reip:
  # Trust parameters
  trust_decay_rate: 0.4
  trust_threshold: 0.70
  min_trust: 0.1
  trust_recovery_rate: 0.02
  # Trust robustness knobs
  trust_deadband: 0.15
  trust_event_pred_min: 0.20
  trust_event_obs_max: 0.05
  trust_decay_cap: 0.15

  # Prediction window for trust measurement
  pred_gain_alpha: 0.10
  pred_gain_radius: 3

  # Connected assignment + beacon tree
  command_radius: 10
  enable_beacon_tether: true   # parent_map used by connected assignment
  tether_margin: 1             # child target within (R - 1) of parent target
  multi_hop_commands: true     # allow relayed commands to reduce leader-loss stalls

  # Exploration/assignment shaping (minimal)
  degree_min_target: 1  # Reduced from 2 to allow more spread (agents don't need 2 neighbors)
  degree_under_penalty: 0.2  # Reduced from 0.4 to ease connectivity pressure
  region_capacity: 1
  frontier_spacing_radius: 6  # Increased from 4 for wider separation between assigned frontiers

  # Connected-assignment spreading knobs
  sibling_angle_bins: 12
  sibling_angle_penalty: 0.6  # Increased from 0.35 to strongly discourage same-sector picks
  allow_anchor_any: true
  repulse_beta: 0.15  # Increased from 0.08 for stronger repulsion from anchors
  repulse_radius: 4  # Increased from 3 for wider repulsion zone
  sibling_sector_capacity: 1
  unique_gain_beta: 0.8  # Increased from 0.6 to reward unique coverage more
  unique_radius: 3                # pixels around target to measure uniqueness
  # Explicit FOV-aware anti-overlap between agents' expected observation windows
  fov_overlap_beta: 0.8  # Increased from 0.5 to heavily penalize overlapping FOVs
  # By default, fov_radius uses agent.sensor_radius; override here if you want different
  # fov_radius: 6
  # Capacity guard: throttle number of front-line agents when the frontier has few safe slots
  capacity_guard_enable: true
  capacity_guard_slack: 1

  # Entropy/frontier scoring (matching spread config)
  dispersion_alpha: 1.2
  jitter: 0.02
  prox_radius: 6
  window: 2
  persist_bonus: 0.6
  switch_margin: 0.15
  reserve_T: 12