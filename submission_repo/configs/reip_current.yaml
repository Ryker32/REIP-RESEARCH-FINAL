# REIP Configuration - Matches current hardware sim parameters
# 5 robots, trust-based governance with fault injection demo

name: "policy/reip_current"
policy: "reip_true"
T: 300
N: 5
map_size: 50
lam: 3

comm:
  radius: 1000
  p_loss: 0.00

agent:
  r_local: 6
  ds: 4
  share_interval: 2

env:
  obstacle_density: 0.06
  seed: 42
  spawn_center: [12, 12]
  spawn_radius: 4

min_hold: 5
known_penalty: 0.6
recent_penalty: 1.2
recent_window: 10
prox_beta: 0.6

# REIP Governance Parameters (matched to reip_node.py values)
reip:
  # Trust and Impeachment - matched to hardware code
  trust_decay_rate: 0.8
  trust_threshold: 0.5
  min_trust: 0.1
  trust_recovery_rate: 0.02

  # Visualization: show per-agent belief maps
  draw_agent_maps: true

  # Impeachment safeguards
  impeachment_cooldown: 15
  impeachment_persistence: 3

  # Dispersion
  dispersion_enabled: true
  dispersion_weight: 0.4
  min_separation_distance: 4

  # CUSUM detection
  cusum_kappa: 0.1
  cusum_threshold: 5.0

  # Hallucination (fault injection) - enable to see trust system in action
  hallucination_rate: 0.00
  # Uncomment to test adversarial scenario:
  # hallucination_rate: 0.03
  # hallucination_profile: dense_explored
  # compromised_agent_id: 0

  # Exploration Parameters
  dispersion_alpha: 1.2
  jitter: 0.02
  cluster_radius: 4
  prox_radius: 6
  window: 2
  persist_bonus: 0.6
  switch_margin: 0.15
  reserve_T: 12
