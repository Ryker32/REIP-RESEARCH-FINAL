name: smoke/reip_phase2
policy: reip_true
T: 60
N: 3
map_size: 20
debug_use_team_frontiers: false   # set true only for the upper-bound sanity check
debug_force_nearest: false
min_hold: 1

env:
  obstacle_density: 0.05
  seed: 1
  debug_frontiers: true
  debug_frontiers_every: 5
  debug_comms: true
  debug_logging: true

comm:
  radius: 12
  p_loss: 0.0

agent:
  # Smaller FOV + finer coarse grid keeps frontiers alive on 20x20
  r_local: 6
  ds: 2
  share_interval: 1

reip:
  command_radius: 12
  window: 2
  prox_radius: 4
  frontier_spacing_radius: 2
  persist_bonus: 0.0
  switch_margin: 0.0
  multi_hop_commands: true

phase2:
  enable: true
  leader_blind: false
  frontiers_from_leader: true
  planner_belief: leader